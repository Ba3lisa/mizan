name: Claude Auto-Fix

on:
  issues:
    types: [labeled, opened, assigned]
  issue_comment:
    types: [created]

jobs:
  claude-fix:
    # Trigger on: bug/enhancement/data-correction labels, or @claude mention in comments
    if: >
      (github.event.action == 'labeled' && (
        github.event.label.name == 'bug' ||
        github.event.label.name == 'enhancement' ||
        github.event.label.name == 'data-correction'
      )) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          label_trigger: "bug,enhancement,data-correction"
          branch_prefix: "claude/"
          prompt: |
            You are fixing a GitHub issue for the Mizan project — Egypt's government transparency platform.

            IMPORTANT: Read CLAUDE.md first for project rules and constraints.

            Context based on label:
            - "bug": Something is broken. Find the root cause, fix it, verify with tsc.
            - "enhancement": A new feature request. Implement it following existing patterns.
            - "data-correction": A data accuracy issue. Fix the data source, pipeline, or display logic.

            Steps:
            1. Read the issue carefully — understand what's expected vs actual behavior
            2. Investigate the relevant source code
            3. Implement the fix or feature (minimal, focused changes)
            4. Run `cd app && npx tsc --noEmit` to verify no type errors
            5. Create a PR with "Closes #<issue-number>" in the body
            6. Summarize what you changed and why in the PR description

            Rules:
            - TypeScript only, no `any` types
            - Use Convex validators on all functions
            - Do NOT merge the PR — leave for human review
            - Do NOT modify production deploy configs or environment variables
            - Do NOT run `./dev release` or push to production
            - If you cannot fix it or are unsure, comment on the issue explaining why and tag @essamgouda97 for guidance
