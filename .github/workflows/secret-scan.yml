name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          echo "Scanning for leaked secrets..."
          PATTERNS=(
            'cfat_[A-Za-z0-9]+'
            'dop_v1_[a-f0-9]+'
            'sk-ant-[A-Za-z0-9]+'
            'ghp_[A-Za-z0-9]+'
            'ghs_[A-Za-z0-9]+'
            'xoxb-[A-Za-z0-9]+'
            'CONVEX_DEPLOY_KEY=prod:'
            'eyJ[A-Za-z0-9+/=]{20,}'
            'BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY'
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.yml" \
              --include="*.yaml" --include="*.json" --include="*.md" --include="*.tf" \
              --include="*.py" --include="*.sh" --include="*.env" \
              -E "$pattern" . \
              --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git \
              --exclude=".env.local" --exclude="secret-scan.yml" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Secret pattern found: $pattern"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Secrets detected in repository! Remove them before merging."
            exit 1
          fi

          echo "No secrets found."
